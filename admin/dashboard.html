<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Catedral Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-church"></i>
                <h3>Catedral Admin</h3>
            </div>
            <nav class="sidebar-nav">
                <a href="#" data-page="dashboard" class="active">
                    <i class="fas fa-tachometer-alt"></i> <span>Dashboard</span>
                </a>
                <a href="#" data-page="noticias">
                    <i class="fas fa-newspaper"></i> <span>Notícias</span>
                </a>
                <a href="#" data-page="confissoes">
                    <i class="fas fa-cross"></i> <span>Confissões</span>
                </a>
                <a href="#" data-page="contato">
                    <i class="fas fa-envelope"></i> <span>Mensagens</span>
                </a>
                <a href="#" data-page="doacoes">
                    <i class="fas fa-hand-holding-heart"></i> <span>Doações</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="btn-logout">
                    <i class="fas fa-sign-out-alt"></i> <span>Sair</span>
                </button>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <div class="content-header">
                <h1 id="pageTitle">Dashboard</h1>
                <div class="user-info">
                    <i class="fas fa-user-shield"></i>
                    <span id="adminName">Carregando...</span>
                </div>
            </div>
            <div id="pageContent">
                <div class="loading">Carregando...</div>
            </div>
        </main>
    </div>
    
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/noticias.js"></script>
    <script src="js/confissoes.js"></script>
    <script src="js/contato.js"></script>
    <script src="js/doacoes.js"></script>
</body>
</html>
